#Brutal Zombie Horde Survival — Heatmap Configuration
#Per-chunk heat system that drives ambient zombie spawns (spec §1.3)
#Higher heat = more zombie activity near noisy players
[heatmap]
	#Enable/disable the heatmap system entirely
	enabled = true
	#Multiplier for heat decay rates (higher = faster decay, lower = slower)
	#1.0 = spec default, 0.5 = heat lingers twice as long, 2.0 = decays twice as fast
	# Default: 1.0
	# Range: 0.1 ~ 5.0
	decayMultiplier = 1.0
	#Multiplier for spawn threshold values (higher = harder to trigger spawns)
	#1.0 = spec default (scouts at 25, screamer at 50, mini-horde at 75, waves at 100)
	#0.5 = thresholds halved (easier spawns), 2.0 = thresholds doubled
	# Default: 1.0
	# Range: 0.5 ~ 3.0
	spawnThresholdMultiplier = 1.0
