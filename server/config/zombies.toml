#Brutal Zombie Horde Survival — Zombie Configuration
#Per-variant HP/damage/speed overrides (spec §3.1)
[zombies]

	[zombies.general]
		#Base max zombies (formula: base + dayNumber * 2, capped at cap)
		# Default: 32
		# Range: 8 ~ 128
		maxZombiesBase = 32
		#Hard cap on max zombies per player
		# Default: 64
		# Range: 16 ~ 256
		maxZombiesCap = 64
		#Speed multiplier bonus for sprint-capable zombies at night (spec §3.2: 1.25 = +125%, i.e. 2.25x base speed)
		# Default: 1.25
		# Range: 0.0 ~ 3.0
		nightSpeedBonus = 1.25
		#Speed multiplier bonus for zombies in dark areas (block light and sky light both <= darknessLightThreshold). Defaults to same value as nightSpeedBonus.
		# Default: 1.25
		# Range: 0.0 ~ 3.0
		darknessSpeedBonus = 1.25
		#Light level threshold for darkness speed bonus. Zombies get the bonus when both block light and sky light are at or below this value.
		# Default: 7
		# Range: 0 ~ 15
		darknessLightThreshold = 7
		#Replace all vanilla hostile mob spawns with BZHS zombie variants
		replaceVanillaHostiles = true
		#Whether zombies can break blocks to reach players
		blockBreakEnabled = true
		#Multiplier for zombie block breaking speed (1.0 = normal)
		# Default: 1.0
		# Range: 0.1 ~ 10.0
		blockBreakSpeedMultiplier = 1.0
		#Range in blocks for zombie heatmap investigation behavior
		# Default: 32
		# Range: 8 ~ 128
		investigateRange = 32
		#Range in blocks for horde pathfinding to players during Blood Moon
		# Default: 64
		# Range: 16 ~ 256
		hordePathRange = 64
		#Range in blocks for horde pathfinding on day 21+
		# Default: 128
		# Range: 32 ~ 512
		hordePathRangeDay21 = 128
		#Global multiplier for block HP values (higher = blocks take longer to break)
		# Default: 1.0
		# Range: 0.1 ~ 10.0
		blockHPMultiplier = 1.0
		#(3.0 Preview) Enable scent-based tracking — zombies detect players carrying raw meat, bleeding, or who recently cooked
		smellTrackingEnabled = false
		#Base smell detection range in blocks (scales with smell value)
		# Default: 20
		# Range: 4 ~ 128
		smellRange = 20

